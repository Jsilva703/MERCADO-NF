services:
  db:
    image: postgres
    container_name: db_i_compras
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_MULTIPLE_DATABASES: icomprasprodutos, icompraspedidos, icomprasclientes
    ports:
      - "5555:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data: